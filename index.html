
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就労継続支援B型 HERO作業所</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ff9f43; 
            --grass-green: #7bed9f;
            --bg-light: #f0fff0; /* 少し緑がかった明るい白 */
        }

        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--bg-light); 
            color: #333; 
            line-height: 1.8; 
            overflow-x: hidden;
            /* 背景全体を芝生風にする */
            background-image: 
                radial-gradient(var(--grass-green) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* --- 5匹のレンジャー犬ヒーロー --- */
        .hero-dog {
            position: fixed; font-size: 2.5rem; z-index: 10000;
            pointer-events: none; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
            display: flex; flex-direction: column; align-items: center;
        }
        .hero-dog::after {
            content: ''; width: 30px; height: 15px;
            border-radius: 50% 50% 0 0; position: absolute; top: 10px; left: -10px;
            z-index: -1; animation: cape-wave 0.4s infinite alternate;
        }
        /* マントの色分け */
        .dog-orange { color: #ff9f43; } .dog-orange::after { background: #ff9f43; }
        .dog-red { color: #ff4757; }    .dog-red::after { background: #ff4757; }
        .dog-blue { color: #54a0ff; }   .dog-blue::after { background: #54a0ff; }
        .dog-green { color: #2ed573; }  .dog-green::after { background: #2ed573; }
        .dog-pink { color: #ff9ff3; }   .dog-pink::after { background: #ff9ff3; }

        @keyframes cape-wave { from { transform: rotate(-20deg); } to { transform: rotate(-40deg); } }

        /* --- 芝生のアニメーション --- */
        .grass-border {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 40px;
            background: var(--grass-green);
            z-index: 999;
            box-shadow: 0 -5px 15px rgba(123, 237, 159, 0.5);
            background-image: linear-gradient(45deg, transparent 25%, rgba(0,0,0,0.05) 25%, rgba(0,0,0,0.05) 50%, transparent 50%, transparent 75%, rgba(0,0,0,0.05) 75%);
            background-size: 20px 20px;
            animation: grass-move 2s linear infinite;
        }
        @keyframes grass-move { from { background-position: 0 0; } to { background-position: 40px 0; } }

        header { background: rgba(255,255,255,0.9); padding: 25px 0; border-bottom: 5px solid var(--grass-green); text-align: center; position: sticky; top:0; z-index: 1001; }
        .logo { font-size: 1.8rem; font-weight: bold; color: #2f3542; }

        .container { 
            width: 85%; max-width: 900px; margin: 30px auto; padding: 40px;
            background: rgba(255, 255, 255, 0.95); border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative; z-index: 10;
        }

        .section-title { color: #2ed573; text-align: center; font-size: 2rem; margin-bottom: 40px; }

        /* 写真ギャラリー */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .photo-frame { 
            background: #eef; border-radius: 20px; height: 200px; 
            display: flex; align-items: center; justify-content: center; 
            border: 3px dashed #7bed9f; color: #7bed9f; font-weight: bold;
        }

        .schedule-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .time-cell { background: var(--grass-green); color: white; padding: 15px; border-radius: 15px 0 0 15px; font-weight: bold; width: 100px; text-align: center; }
        .content-cell { background: #fff; padding: 15px; border-radius: 0 15px 15px 0; border: 1px solid #eee; }

        footer { background: #2f3542; color: #fff; padding: 40px 0; text-align: center; position: relative; z-index: 10; }
    </style>
</head>
<body>

<!-- 5匹のヒーロー犬 -->
<div id="dog1" class="hero-dog dog-orange"><i class="fas fa-dog"></i></div>
<div id="dog2" class="hero-dog dog-red"><i class="fas fa-dog"></i></div>
<div id="dog3" class="hero-dog dog-blue"><i class="fas fa-dog"></i></div>
<div id="dog4" class="hero-dog dog-green"><i class="fas fa-dog"></i></div>
<div id="dog5" class="hero-dog dog-pink"><i class="fas fa-dog"></i></div>

<!-- 動く芝生フッター -->
<div class="grass-border"></div>

<header>
    <div class="logo">就労継続支援B型 HERO作業所</div>
</header>

<div class="container">
    <section>
        <h2 class="section-title">作業所の風景</h2>
        <div class="photo-grid">
            <div class="photo-frame">PHOTO 01</div>
            <div class="photo-frame">PHOTO 02</div>
            <div class="photo-frame">PHOTO 03</div>
            <div class="photo-frame">PHOTO 04</div>
            <div class="photo-frame">PHOTO 05</div>
            <div class="photo-frame">PHOTO 06</div>
        </div>
    </section>

    <section style="margin-top: 60px;">
        <h2 class="section-title">一日の流れ</h2>
        <table class="schedule-table">
            <tr><td class="time-cell">10:00</td><td class="content-cell">朝礼後、作業開始</td></tr>
            <tr><td class="time-cell">11:00</td><td class="content-cell">10分休憩</td></tr>
            <tr><td class="time-cell">12:00</td><td class="content-cell">お昼休憩</td></tr>
            <tr><td class="time-cell">13:00</td><td class="content-cell">昼礼後、作業開始</td></tr>
            <tr><td class="time-cell">13:50</td><td class="content-cell">10分休憩</td></tr>
            <tr><td class="time-cell">15:00</td><td class="content-cell">20分休憩</td></tr>
            <tr><td class="time-cell">16:45</td><td class="content-cell">終礼</td></tr>
            <tr><td class="time-cell">17:00</td><td class="content-cell">終了</td></tr>
        </table>
    </section>

    <section style="margin-top: 60px; text-align: center;">
        <h2 class="section-title">お問い合わせ</h2>
        <p>TEL : <strong>06-6379-5695</strong> / FAX : 06-6379-5696</p>
        <p><a href="mailto:HERO0333hero@outlook.com" style="color:var(--grass-green); font-weight:bold;">HERO0333hero@outlook.com</a></p>
    </section>
</div>

<footer>
    <p>&copy; 2026 就労継続支援B型 HERO作業所</p>
</footer>

<script>
    const dogs = [
        { id: 'dog1', angle: 0, speed: 0.01, range: 300 },
        { id: 'dog2', angle: 2, speed: 0.012, range: 400 },
        { id: 'dog3', angle: 4, speed: 0.008, range: 250 },
        { id: 'dog4', angle: 1, speed: 0.015, range: 350 },
        { id: 'dog5', angle: 5, speed: 0.009, range: 200 }
    ];

    function flyDogs() {
        const scrollY = window.scrollY;
        dogs.forEach((d, i) => {
            const el = document.getElementById(d.id);
            // 円運動 + スクロールによる上下の揺れ
            const x = window.innerWidth / 2 + Math.cos(d.angle) * (window.innerWidth / 2.2);
            const y = window.innerHeight / 2 + Math.sin(d.angle * 0.8) * (window.innerHeight / 3) + (Math.sin(scrollY * 0.05) * 10);
            
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.transform = `rotate(${Math.sin(d.angle) * 20}deg) translateY(${Math.sin(scrollY * 0.1) * 5}px)`;
            
            d.angle += d.speed;
        });
        requestAnimationFrame(flyDogs);
    }
    flyDogs();
</script>
</body>
</html>
